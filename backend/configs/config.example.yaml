app:
  name: mini-store-go-api
  env: development
  host: 0.0.0.0
  port: 8080
  read_timeout: 10s
  write_timeout: 10s
  idle_timeout: 60s
  shutdown_timeout: 10s

auth:
  access_secret: change-me-access-secret
  refresh_secret: change-me-refresh-secret
  password_secret: change-me-password-secret
  access_ttl: 15m
  refresh_ttl: 720h
  access_cookie_name: mini_store_access_token
  refresh_cookie_name: mini_store_refresh_token
  session_cart_cookie_name: session_cart_id
  cookie_domain: ""
  # For a deployed frontend and API on different sites, set cookie_secure: true
  # and cookie_same_site: none, or override with MINI_STORE_AUTH_COOKIE_* env vars.
  cookie_secure: false
  cookie_http_only: true
  cookie_same_site: lax

database:
  dsn: postgres://postgres:postgres@localhost:5432/mini_store?sslmode=disable
  auto_migrate: false
  max_idle_conns: 10
  max_open_conns: 50
  conn_max_lifetime: 30m

redis:
  addr: localhost:6379
  password: ""
  db: 0
  pool_size: 10

log:
  level: debug
  encoding: console
  development: true

cors:
  allowed_origins:
    - http://localhost:5173
    - http://localhost:3000
  allowed_methods:
    - GET
    - POST
    - PUT
    - PATCH
    - DELETE
    - OPTIONS
  allowed_headers:
    - Origin
    - Content-Type
    - Accept
    - Authorization
    - X-Requested-With
    - X-Request-Id
  exposed_headers:
    - X-Request-Id
  allow_credentials: true
  max_age: 12h

ai:
  enabled: false
  provider: openai
  api_key: ""
  base_url: ""
  model: ""
  system_prompt: >
    You are the Mini Store shopping assistant. Use the provided product context
    when it is relevant, keep recommendations grounded in available catalog
    data, and be explicit when you are making a best-effort inference.
  timeout: 60s
  max_context_products: 5
  temperature: 0.3
