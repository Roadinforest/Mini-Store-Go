openapi: 3.0.3
info:
  title: Mini Store API
  version: 1.0.0
  description: API contract for the Go backend, including commerce, account, upload, and AI endpoints.
servers:
  - url: http://localhost:8080
tags:
  - name: Health
  - name: Auth
  - name: Users
  - name: Products
  - name: Cart
  - name: Orders
  - name: Admin
  - name: Uploads
  - name: AI
paths:
  /healthz:
    get:
      tags: [Health]
      summary: Service health check
      responses:
        '200':
          description: Healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
  /api/v1/ping:
    get:
      tags: [Health]
      summary: Ping endpoint
      responses:
        '200':
          description: Pong response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
  /api/v1/auth/sign-up:
    post:
      tags: [Auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignUpInput'
      responses:
        '200':
          description: Authenticated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
  /api/v1/auth/sign-in:
    post:
      tags: [Auth]
      summary: Sign in
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignInInput'
      responses:
        '200':
          description: Authenticated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
  /api/v1/auth/sign-out:
    post:
      tags: [Auth]
      summary: Sign out
      responses:
        '200':
          description: Signed out
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
  /api/v1/auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      responses:
        '200':
          description: Refreshed auth session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
  /api/v1/auth/me:
    get:
      tags: [Auth]
      summary: Current user
      security:
        - cookieAuth: []
        - bearerAuth: []
      responses:
        '200':
          description: Authenticated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
  /api/v1/users/me:
    get:
      tags: [Users]
      summary: Get profile
      security:
        - cookieAuth: []
        - bearerAuth: []
      responses:
        '200':
          description: Current profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
    put:
      tags: [Users]
      summary: Update profile
      security:
        - cookieAuth: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileInput'
      responses:
        '200':
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
  /api/v1/users/me/address:
    put:
      tags: [Users]
      summary: Update default address
      security:
        - cookieAuth: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAddressInput'
      responses:
        '200':
          description: Updated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
  /api/v1/users/me/payment-method:
    put:
      tags: [Users]
      summary: Update payment method
      security:
        - cookieAuth: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePaymentMethodInput'
      responses:
        '200':
          description: Updated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
  /api/v1/products:
    get:
      tags: [Products]
      summary: List products
      parameters:
        - in: query
          name: page
          schema: { type: integer }
        - in: query
          name: limit
          schema: { type: integer }
        - in: query
          name: q
          schema: { type: string }
        - in: query
          name: category
          schema: { type: string }
        - in: query
          name: price
          schema: { type: string }
        - in: query
          name: rating
          schema: { type: string }
        - in: query
          name: sort
          schema: { type: string }
      responses:
        '200':
          description: Paged products
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
  /api/v1/products/featured:
    get:
      tags: [Products]
      summary: Featured products
      responses:
        '200':
          description: Featured products
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
  /api/v1/products/latest:
    get:
      tags: [Products]
      summary: Latest products
      responses:
        '200':
          description: Latest products
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
  /api/v1/products/categories:
    get:
      tags: [Products]
      summary: Category summary
      responses:
        '200':
          description: Category counts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
  /api/v1/products/slug/{slug}:
    get:
      tags: [Products]
      summary: Product by slug
      parameters:
        - in: path
          name: slug
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Product details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
  /api/v1/cart:
    get:
      tags: [Cart]
      summary: Get current cart
      responses:
        '200':
          description: Cart
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
  /api/v1/cart/items:
    post:
      tags: [Cart]
      summary: Add item to cart
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddCartItemInput'
      responses:
        '200':
          description: Updated cart
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
  /api/v1/cart/items/{productID}:
    delete:
      tags: [Cart]
      summary: Remove item from cart
      parameters:
        - in: path
          name: productID
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Updated cart
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
  /api/v1/orders:
    post:
      tags: [Orders]
      summary: Create order from current cart
      security:
        - cookieAuth: []
        - bearerAuth: []
      responses:
        '200':
          description: Created order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
  /api/v1/orders/mine:
    get:
      tags: [Orders]
      summary: Current user orders
      security:
        - cookieAuth: []
        - bearerAuth: []
      responses:
        '200':
          description: Paged orders
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
  /api/v1/orders/{id}:
    get:
      tags: [Orders]
      summary: Order details
      security:
        - cookieAuth: []
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Order details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
  /api/v1/uploads/images:
    post:
      tags: [Uploads]
      summary: Upload product or profile image
      security:
        - cookieAuth: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: Uploaded file metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
  /api/v1/ai/chat:
    post:
      tags: [AI]
      summary: Chat completion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatInput'
      responses:
        '200':
          description: Chat response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
  /api/v1/ai/chat/stream:
    post:
      tags: [AI]
      summary: Streaming chat completion over SSE
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatInput'
      responses:
        '200':
          description: SSE stream
          content:
            text/event-stream:
              schema:
                type: string
                example: "data: {\"type\":\"partial\",\"content\":\"hello\"}\n\ndata: [DONE]\n\n"
  /api/v1/admin/overview:
    get:
      tags: [Admin]
      summary: Admin overview
      security:
        - cookieAuth: []
        - bearerAuth: []
      responses:
        '200':
          description: Admin dashboard metrics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    cookieAuth:
      type: apiKey
      in: cookie
      name: mini_store_access_token
  schemas:
    Envelope:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        data:
          nullable: true
        details:
          nullable: true
    SignUpInput:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
    SignInInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    UpdateProfileInput:
      type: object
      required: [name, email]
      properties:
        name:
          type: string
        email:
          type: string
          format: email
    UpdateAddressInput:
      type: object
      required: [full_name, street_address, city, postal_code, country]
      properties:
        full_name:
          type: string
        street_address:
          type: string
        city:
          type: string
        postal_code:
          type: string
        country:
          type: string
    UpdatePaymentMethodInput:
      type: object
      required: [type]
      properties:
        type:
          type: string
    AddCartItemInput:
      type: object
      required: [product_id]
      properties:
        product_id:
          type: string
    ChatInput:
      type: object
      required: [messages]
      properties:
        messages:
          type: array
          items:
            $ref: '#/components/schemas/ChatMessage'
    ChatMessage:
      type: object
      required: [role, content]
      properties:
        role:
          type: string
          enum: [user, assistant, system]
        content:
          type: string
        url:
          type: string
        messageType:
          type: string
          enum: [normal, tool_call]
        toolName:
          type: string
